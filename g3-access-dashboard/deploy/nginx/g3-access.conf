# Nginx vhost for G3 Access dashboard + API.
# Install: /etc/nginx/sites-available/g3-access, symlink to sites-enabled.

server {
    listen 80;
    server_name dashboard.example.com;

    # Redirect to HTTPS once TLS is configured (certbot or CloudFront in front).
    # return 301 https://$host$request_uri;

    root /var/www/g3-access-dashboard/public;
    index index.php;

    access_log /var/log/nginx/g3-access-access.log;
    error_log  /var/log/nginx/g3-access-error.log;

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 180;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    # API is higher-volume than the web UI; give it a larger body limit
    # if you ever pass rendered HTML snapshots through it (Phase 3).
    client_max_body_size 16M;
}
